<footer class="footer" role="contentinfo">
  <div class="container">
    <div class="footer__inner">

      <div class="footer__brand" data-testid="footer-brand">
        <span class="footer__logo">Unwritten Co.</span>
        <p class="footer__tagline">Digital products, assisted by AI.</p>
      </div>

      <nav class="footer__nav" aria-label="Footer navigation">
        <ul class="footer__nav-list" role="list">
          @for (link of navLinks; track link.id) {
            <li>
              <button
                class="footer__nav-link"
                (click)="scrollTo(link.id)"
                [attr.data-testid]="'footer-nav-' + link.id"
              >
                {{ link.label }}
              </button>
            </li>
          }
        </ul>
      </nav>

    </div>

    <div class="footer__bottom">
      <p class="footer__copy" data-testid="footer-copy">
        &copy; {{ year }} Unwritten Co. All rights reserved.
      </p>
      <p class="footer__status" data-testid="footer-status" aria-label="System status: all systems operational">
        <span class="footer__status-dot" aria-hidden="true"></span>
        All systems bound and operational
      </p>
    </div>
  </div>
</footer>

<nav class="navbar" [class.navbar--scrolled]="isScrolled()" [class.navbar--light-bg]="lightBg" role="navigation" aria-label="Main navigation">
  <div class="navbar__inner">
    <a routerLink="/" class="navbar__logo" data-testid="navbar-logo">Unwritten</a>

    <ul class="navbar__links" role="list">
      <li>
        <a routerLink="/about" class="navbar__link" routerLinkActive="navbar__link--active" data-testid="nav-about">
          About
        </a>
      </li>
      <li>
        <a routerLink="/team" class="navbar__link" routerLinkActive="navbar__link--active" data-testid="nav-team">
          Team
        </a>
      </li>
      <li>
        <a href="mailto:brian&#64;unwrittenco.com" class="navbar__link navbar__link--cta" data-testid="nav-cta">
          Let's talk
        </a>
      </li>
    </ul>

    <button
      class="navbar__burger"
      (click)="toggleMobile()"
      [attr.aria-expanded]="mobileOpen()"
      aria-controls="mobile-nav"
      aria-label="Toggle navigation"
    >
      <span class="navbar__burger-bar" aria-hidden="true"></span>
      <span class="navbar__burger-bar" aria-hidden="true"></span>
    </button>
  </div>

  @if (mobileOpen()) {
    <div class="navbar__mobile" id="mobile-nav" role="menu">
      <a routerLink="/about" class="navbar__mobile-link" routerLinkActive="navbar__mobile-link--active" (click)="closeMobile()">About</a>
      <a routerLink="/team" class="navbar__mobile-link" routerLinkActive="navbar__mobile-link--active" (click)="closeMobile()">Team</a>
      <a href="https://journal.unwrittenco.com" target="_blank" rel="noopener" class="navbar__mobile-link" (click)="closeMobile()">Journal</a>
      <a href="mailto:brian&#64;unwrittenco.com" class="navbar__mobile-link navbar__mobile-link--cta" (click)="closeMobile()">Let's talk</a>
    </div>
  }
</nav>

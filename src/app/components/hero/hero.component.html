<section class="hero" aria-label="Hero">
  <div class="hero__bg" aria-hidden="true">
    <img
      class="hero__image"
      src="https://images.unsplash.com/photo-1473186505569-9c61870c11f9?auto=format&fit=crop&w=1920&q=80"
      alt=""
      loading="eager"
      fetchpriority="high"
    />
    <div class="hero__overlay"></div>
  </div>

  <div class="hero__content">
    <p class="hero__eyebrow reveal" data-testid="hero-eyebrow">
      Your story isn't written yet
    </p>
    <h1 class="hero__headline reveal reveal--delay-1" data-testid="hero-headline">
      Let's begin.
    </h1>
    <p class="hero__subline reveal reveal--delay-2" data-testid="hero-subline">
      We're a boutique studio that builds digital products with the patience
      of a craftsman and the precision of an engineer. Every project starts
      as a blank page.
    </p>
    <button
      class="hero__cta reveal reveal--delay-3"
      (click)="scrollToWork()"
      data-testid="hero-cta"
    >
      Start writing
    </button>
  </div>
</section>
